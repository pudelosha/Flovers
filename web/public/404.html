<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      (function () {
        var isGitHubPages = window.location.hostname === "pudelosha.github.io";
        var repo = isGitHubPages ? "/Flovers" : "";

        // Example:
        // GitHub Pages: "/Flovers/pl/terms"
        // Custom domain: "/pl/terms"
        var fullPath = window.location.pathname;

        // Strip repo prefix only on GitHub Pages
        var p = repo && fullPath.indexOf(repo) === 0 ? fullPath.slice(repo.length) : fullPath;
        if (!p.startsWith("/")) p = "/" + p;

        var search = window.location.search || "";
        var hash = window.location.hash || "";

        // Redirect to index with p=/pl/terms
        var target =
          repo +
          "/?p=" +
          encodeURIComponent(p) +
          (search ? "&" + search.slice(1) : "") +
          hash;

        window.location.replace(target);
      })();
    </script>
  </head>
  <body></body>
</html>
