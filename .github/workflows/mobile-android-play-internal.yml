name: Mobile Android -> Play Internal

on:
  push:
    branches:
      - main
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-android-play-internal.yml'
  workflow_dispatch:

concurrency:
  group: mobile-android-play-internal-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-publish-internal:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    env:
      PACKAGE_NAME: com.flovers.mobile
      BASE_VERSION_CODE: 1000

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install JS dependencies
        run: npm ci

      - name: Compute Android version values
        id: versioning
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION_NAME="${PKG_VERSION}+${SHORT_SHA}"
          VERSION_CODE=$((BASE_VERSION_CODE + GITHUB_RUN_NUMBER))

          echo "pkg_version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

          echo "Computed versionName=$VERSION_NAME"
          echo "Computed versionCode=$VERSION_CODE"

      - name: Patch build.gradle versionCode/versionName
        shell: bash
        run: |
          perl -0pi -e 's/versionCode\s+\d+/versionCode '"${{ steps.versioning.outputs.version_code }}"'/g' android/app/build.gradle
          perl -0pi -e 's/versionName\s+"[^"]+"/versionName "'"${{ steps.versioning.outputs.version_name }}"'"/g' android/app/build.gradle

          echo "Patched build.gradle:"
          grep -nE 'versionCode|versionName' android/app/build.gradle

      - name: Decode Android keystore
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks

      - name: Create keystore.properties
        shell: bash
        run: |
          cat > android/keystore.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Create google-services.json
        shell: bash
        run: |
          cat > android/app/google-services.json <<'EOF'
          ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
          EOF

      - name: Create Play service account JSON
        shell: bash
        run: |
          cat > android/play-service-account.json <<'EOF'
          ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install Fastlane
        run: gem install fastlane -NV

      - name: Build Android App Bundle
        shell: bash
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon -x lintVitalAnalyzeRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-android-aab-${{ steps.versioning.outputs.version_name }}
          path: mobile/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14

      - name: Publish to Google Play Internal
        shell: bash
        run: |
          fastlane supply \
            --aab android/app/build/outputs/bundle/release/app-release.aab \
            --package_name "${PACKAGE_NAME}" \
            --track internal \
            --release_status completed \
            --json_key android/play-service-account.json \
            --skip_upload_metadata true \
            --skip_upload_images true \
            --skip_upload_screenshots true \
            --skip_upload_changelogs true